version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: catalog_mongo
    ports:
      - "27017:27017"
    volumes:
      - catalog_mongo_data:/data/db

  redis:
    image: redis:alpine
    container_name: catalog_redis
    ports:
      - "6379:6379"

volumes:
  catalog_mongo_data: