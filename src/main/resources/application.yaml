spring:
  application:
    name: CatalogGateway

  data:
    mongodb:
      uri: mongodb://localhost:27017/catalog_db
    redis:
      host: localhost
      port: 6379

api:
  security:
    token:
      secret: ${JWT_SECRET}

external:
  viacep:
    url: https://viacep.com.br/ws

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs